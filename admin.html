<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>LUV 관리자 — 내용 수정</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20rx='24'%20fill='%23ff7eb3'/%3E%3Ctext%20x='50'%20y='54'%20font-size='58'%20text-anchor='middle'%20dominant-baseline='central'%20fill='white'%3E%E2%9A%99%3C/text%3E%3C/svg%3E" />
  <style>
    :root{
      --pink-100:#ffe9f2; --pink-200:#ffd6e7; --pink-400:#ff9ec4;
      --pink-500:#ff7eb3; --pink-600:#f15f9c; --plum:#9a5b7a;
      --ink:#4a3b44; --ink-soft:#8a7681; --cream:#fffafc;
      --radius:18px; --radius-pill:999px;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; font-family:'Gowun Dodum','Malgun Gothic',sans-serif; color:var(--ink);
      background:radial-gradient(900px 500px at 90% -10%,var(--pink-100),transparent 60%),var(--cream);
      padding-bottom:110px; line-height:1.6;
    }
    .topbar{
      position:sticky; top:0; z-index:10;
      background:rgba(255,250,252,.9); backdrop-filter:blur(10px);
      border-bottom:1px solid var(--pink-100);
      padding:1rem 1.2rem; display:flex; align-items:center; gap:.7rem;
    }
    .topbar h1{font-size:1.2rem; margin:0; color:var(--pink-600);}
    .badge-admin{font-size:.7rem; font-weight:700; color:#fff; background:var(--pink-500); padding:.2rem .6rem; border-radius:var(--radius-pill);}
    .wrap{max-width:880px; margin:0 auto; padding:1.2rem;}
    .note{
      background:#fff7fb; border:1px solid var(--pink-200); border-radius:var(--radius);
      padding:1rem 1.2rem; margin-bottom:1.5rem; font-size:.92rem; color:var(--plum);
    }
    .note b{color:var(--pink-600);}
    .section{
      background:#fff; border:1px solid var(--pink-100); border-radius:var(--radius);
      padding:1.2rem 1.3rem; margin-bottom:1.3rem; box-shadow:0 10px 30px -18px rgba(241,95,156,.4);
    }
    .section > h2{font-size:1.1rem; color:var(--plum); margin:0 0 .3rem;}
    .section > .help{font-size:.85rem; color:var(--ink-soft); margin:0 0 1rem;}
    .row{
      background:#fffafc; border:1px solid var(--pink-100); border-radius:14px;
      padding:.9rem 1rem; margin-bottom:.8rem; position:relative;
      display:grid; gap:.6rem;
    }
    .field{display:grid; gap:.25rem;}
    .field label{font-size:.78rem; font-weight:700; color:var(--plum);}
    .field input, .field select{
      font-family:inherit; font-size:.95rem; color:var(--ink);
      border:1px solid var(--pink-200); border-radius:10px; padding:.55rem .7rem; background:#fff; width:100%;
    }
    .field input:focus, .field select:focus{outline:2px solid var(--pink-400); outline-offset:1px;}
    .links-grid{display:grid; grid-template-columns:1fr 1fr; gap:.7rem;}
    .row-del{
      position:absolute; top:.6rem; right:.6rem;
      background:var(--pink-100); color:var(--pink-600); border:none; border-radius:8px;
      font-size:.78rem; font-weight:700; padding:.25rem .55rem; cursor:pointer;
    }
    .row-del:hover{background:var(--pink-200);}
    .add-btn{
      background:#fff; color:var(--pink-600); border:2px dashed var(--pink-300);
      border-radius:var(--radius-pill); padding:.5rem 1.1rem; font-weight:700; font-size:.9rem; cursor:pointer;
    }
    .add-btn:hover{background:var(--pink-100);}
    .actionbar{
      position:fixed; left:0; right:0; bottom:0; z-index:20;
      background:rgba(255,250,252,.95); backdrop-filter:blur(10px);
      border-top:1px solid var(--pink-200); padding:.9rem 1.2rem;
      display:flex; gap:.7rem; justify-content:center; flex-wrap:wrap;
    }
    .btn{
      font-family:inherit; font-weight:700; font-size:1rem; border:none; cursor:pointer;
      border-radius:var(--radius-pill); padding:.8rem 1.6rem;
    }
    .btn-save{color:#fff; background:linear-gradient(120deg,var(--pink-600),var(--pink-400)); box-shadow:0 10px 24px -10px var(--pink-500);}
    .btn-save:hover{transform:translateY(-2px);}
    .btn-reload{color:var(--pink-600); background:#fff; border:2px solid var(--pink-200);}
    .saved-msg{align-self:center; color:var(--pink-600); font-weight:700; font-size:.9rem;}
    @media(max-width:600px){ .links-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="badge-admin">ADMIN</span>
    <h1>LUV 관리자 — 내용 수정</h1>
  </div>

  <div class="wrap">
    <div class="note">
      이 화면에서 고친 뒤 아래 <b>💾 data.json 다운로드</b> 버튼을 누르면 <b>data.json</b> 파일이 받아져요.<br />
      그 파일을 <b>luv-website 폴더에 넣고(기존 것 덮어쓰기)</b> 사이트를 새로고침하면 반영됩니다.<br />
      ⚠️ 이 화면에서 고친다고 인터넷 사이트가 <b>자동으로 바뀌지는 않아요.</b> (자동반영은 추후 CMS 단계에서)
    </div>

    <div id="forms"></div>
  </div>

  <div class="actionbar">
    <button class="btn btn-reload" id="reloadBtn">↺ 현재값 다시 불러오기</button>
    <button class="btn btn-save" id="saveBtn">💾 data.json 다운로드</button>
    <span class="saved-msg" id="savedMsg" hidden>저장됨! 폴더에 넣어주세요 ✔</span>
  </div>

  <script>
    /* =========================================================
       편집 대상 정의 (script.js 상단 데이터와 같은 구조)
       fields: [키, 화면라벨, (선택)드롭다운옵션]
       ========================================================= */
    const SCHEMA = {
      LINKS: {
        title: "1) 링크 (버튼 주소)", kind: "object",
        help: "각 버튼이 눌렀을 때 가는 주소예요. 아직 없으면 # 그대로 두세요.",
        keys: [
          ["soopLive","SOOP 방송"], ["ytLuv","LUV 유튜브"], ["ytNight","LUV NIGHT"],
          ["ytLittleluv","LITTLE LUV"], ["ytDance","LUV DANCE"], ["ytAi","LUV AI"],
          ["ytBgm","LUV BGM"], ["tiktok","TikTok"], ["instagram","Instagram"],
          ["xiaohongshu","샤오홍슈"], ["kakao","카카오톡"], ["fanCafe","팬카페"],
          ["goods","굿즈"], ["donate","후원"], ["email","이메일"]
        ]
      },
      OFFICIAL_NOTICES: {
        title: "2) 공식 공지 (유튜브·브랜드·굿즈)", kind: "array",
        help: "공식 홈(index.html) 공지예요. 분류로 필터·배지색이 정해져요.",
        fields: [["type","분류",["all","youtube","brand","event","update"]],["label","배지글자"],["text","공지 내용"],["link","링크"]]
      },
      LIVE_NOTICES: {
        title: "2-2) 방송 공지 (방송·휴방·변경·참여)", kind: "array",
        help: "방송 홈(live.html) 공지예요.",
        fields: [["type","분류",["all","soop","rest","change","viewer"]],["label","배지글자"],["text","공지 내용"],["link","링크"]]
      },
      SCHEDULE: {
        title: "3) 방송일정 (캘린더)", kind: "array",
        help: "날짜는 YYYY-MM-DD 형식. 요일은 자동 계산돼요.",
        fields: [["date","날짜(2026-07-05)"],["time","시간(20:00)"],["title","방송 제목"],["type","종류",["live","youtube"]]]
      },
      CONTENTS: {
        title: "4) LUV CONTENT 카드", kind: "array",
        help: "가로로 넘기는 카드. 색(accent/soft)은 비워둬도 돼요.",
        fields: [["emoji","이모지"],["name","이름"],["desc","설명"],["platform","플랫폼"],["link","링크"],["btn","버튼글자(선택)"],["accent","색1(선택)"],["soft","색2(선택)"]]
      },
      CHANNELS: {
        title: "5) 유튜브 채널 카드", kind: "array",
        help: "img는 assets 폴더의 사진 경로. 없으면 이모지가 대신 나와요.",
        fields: [["emoji","이모지"],["name","채널명"],["img","사진경로"],["desc","한 줄 설명"],["link","링크"]]
      },
      SNS: {
        title: "6) SNS 링크", kind: "array",
        help: "color는 아이콘 배경색(예: #e1407a).",
        fields: [["icon","아이콘"],["label","이름"],["link","링크"],["color","색"]]
      },
      CLIPS: {
        title: "7) 최신 클립", kind: "array",
        help: "img는 썸네일 경로. 없으면 분홍 배경이 나와요.",
        fields: [["img","썸네일경로"],["title","제목"],["views","조회수"],["duration","길이(08:14)"],["link","링크"]]
      },
      FAN: {
        title: "8) 팬공간", kind: "array",
        help: "'지금 열기?'를 예(true)로 하고 링크를 넣으면 버튼이 활성화돼요.",
        fields: [["emoji","이모지"],["title","제목"],["desc","설명"],["ready","지금 열기?",["false","true"]],["link","링크"]]
      },
      SUPPORT: {
        title: "9) 굿즈 / 후원", kind: "array",
        help: "mod는 카드 색 종류예요.",
        fields: [["mod","카드색",["goods","donate"]],["emoji","이모지"],["title","제목"],["desc","설명"],["btn","버튼글자"],["link","링크"]]
      }
    };

    /* 기본값(시드) — data.json 이 아직 없을 때 폼에 채워지는 현재 사이트 값 */
    const SEED = {
      LINKS: { soopLive:"#", ytLuv:"#", ytNight:"#", ytLittleluv:"#", ytDance:"#", ytAi:"#", ytBgm:"#",
        tiktok:"#", instagram:"#", xiaohongshu:"#", kakao:"#", fanCafe:"#", goods:"#", donate:"#",
        email:"mailto:jes.endolphin@gmail.com" },
      OFFICIAL_NOTICES: [
        { type:"youtube", label:"YouTube", text:"LUV NIGHT 새 영상 업로드", link:"#" },
        { type:"brand", label:"브랜드", text:"복귀 일정 안내", link:"#officialNotice" },
        { type:"event", label:"이벤트", text:"팬카페 오픈 이벤트 안내", link:"#" }
      ],
      LIVE_NOTICES: [
        { type:"soop", label:"방송", text:"6월 29일 종합 라이브 방송", link:"#" },
        { type:"viewer", label:"참여", text:"시청자 참여 방송 안내", link:"#" },
        { type:"change", label:"변경", text:"방송 일정 변경 안내", link:"#schedule" }
      ],
      SCHEDULE: [
        { date:"2026-06-29", time:"20:00", title:"종합 라이브 방송", type:"live" },
        { date:"2026-06-30", time:"20:00", title:"시청자 참여 방송", type:"live" },
        { date:"2026-07-01", time:"20:00", title:"LUV NIGHT", type:"youtube" },
        { date:"2026-07-02", time:"20:00", title:"스타크래프트", type:"live" }
      ],
      CONTENTS: [
        { emoji:"♥", name:"LUV", desc:"종합 라이브 방송", platform:"SOOP LIVE", link:"#", btn:"오늘의 콘텐츠 보러가기", accent:"#ff5f8f", soft:"#ffe1ea" },
        { emoji:"🌙", name:"LUV NIGHT", desc:"마음근력 힐링 토크", platform:"YouTube", link:"#", btn:"", accent:"#9a7bd6", soft:"#ece1fb" },
        { emoji:"👶", name:"LITTLE LUV", desc:"육아 & 일상 이야기", platform:"YouTube", link:"#", btn:"", accent:"#ff9f68", soft:"#ffe9d6" },
        { emoji:"💃", name:"LUV DANCE", desc:"댄스 & 챌린지", platform:"YouTube", link:"#", btn:"", accent:"#ff5fb0", soft:"#ffe1f1" },
        { emoji:"🤖", name:"LUV AI", desc:"AI 프로젝트 & 자동화", platform:"YouTube", link:"#", btn:"", accent:"#4cb8d6", soft:"#d6f0f8" },
        { emoji:"🎵", name:"LUV BGM", desc:"음악 & 플레이리스트", platform:"YouTube", link:"#", btn:"", accent:"#5fc79a", soft:"#d6f5e7" }
      ],
      CHANNELS: [
        { emoji:"♥", name:"LUV", img:"assets/profile-luv.png", desc:"러브의 메인 — 방송 다시보기와 하이라이트", link:"#" },
        { emoji:"🌙", name:"LUV NIGHT", img:"assets/profile-night.png", desc:"잠들기 전, 마음을 안아주는 힐링 토크", link:"#" },
        { emoji:"👶", name:"LITTLE LUV", img:"assets/profile-littleluv.png", desc:"아이와 함께 자라는 따뜻한 육아 일상", link:"#" },
        { emoji:"💃", name:"LUV DANCE", img:"assets/profile-dance.png", desc:"신나는 댄스와 챌린지로 채우는 하루", link:"#" },
        { emoji:"🤖", name:"LUV AI", img:"assets/profile-ai.png", desc:"AI로 함께 성장하는 프로젝트 기록", link:"#" },
        { emoji:"🎵", name:"LUV BGM", img:"assets/profile-bgm.png", desc:"순간을 채우는 음악과 플레이리스트", link:"#" }
      ],
      SNS: [
        { icon:"🎵", label:"TikTok", link:"#", color:"#222" },
        { icon:"📷", label:"Instagram", link:"#", color:"#e1407a" },
        { icon:"📕", label:"샤오홍슈", link:"#", color:"#ff2442" },
        { icon:"💬", label:"카카오톡 채널", link:"#", color:"#f5c000" }
      ],
      CLIPS: [
        { img:"assets/clip-1.png", title:"무너졌던 밤, 다시 일어선 이야기", views:"조회수 1.2만회", duration:"08:14", link:"#" },
        { img:"assets/clip-2.png", title:"오늘의 육아 브이로그 — 작은 행복", views:"조회수 8.6천회", duration:"12:03", link:"#" },
        { img:"assets/clip-3.png", title:"스타 명경기 하이라이트 모음", views:"조회수 3.4만회", duration:"05:47", link:"#" }
      ],
      FAN: [
        { emoji:"📝", title:"팬 게시판", desc:"러브에게 남기는 한마디를 모을 공간이에요.", ready:false, link:"#" },
        { emoji:"🎨", title:"팬아트 갤러리", desc:"팬들이 그린 러브를 함께 감상하는 공간이에요.", ready:false, link:"#" }
      ],
      SUPPORT: [
        { mod:"goods", emoji:"🛍️", title:"LUV 공식 굿즈", desc:"러브와 함께하는 작은 기념품들", btn:"굿즈 보러가기", link:"#" },
        { mod:"donate", emoji:"💝", title:"LUV 후원하기", desc:"따뜻한 마음이 다음 콘텐츠가 돼요", btn:"후원하기", link:"#" }
      ]
    };

    const $ = (s, r=document) => r.querySelector(s);
    const eln = (t,c) => { const n=document.createElement(t); if(c)n.className=c; return n; };
    let DATA = {};

    function makeInput(key, label, value, opts) {
      const f = eln("div","field");
      const lb = eln("label"); lb.textContent = label; f.appendChild(lb);
      let input;
      if (opts) {
        input = eln("select");
        opts.forEach(o => { const op=eln("option"); op.value=o; op.textContent=o; input.appendChild(op); });
        input.value = String(value);
      } else {
        input = eln("input"); input.type = "text"; input.value = value == null ? "" : value;
      }
      input.dataset.key = key;
      f.appendChild(input);
      return f;
    }

    function makeRow(def, item, listBox) {
      const row = eln("div","row");
      const del = eln("button","row-del"); del.type="button"; del.textContent="✕ 삭제";
      del.onclick = () => row.remove();
      row.appendChild(del);
      def.fields.forEach(([key,label,opts]) => {
        const val = key === "ready" ? String(!!item[key]) : (item[key] ?? "");
        row.appendChild(makeInput(key, label, val, opts));
      });
      listBox.appendChild(row);
    }

    function buildForms() {
      const root = $("#forms");
      root.innerHTML = "";
      Object.keys(SCHEMA).forEach(name => {
        const def = SCHEMA[name];
        const sec = eln("div","section");
        const h = eln("h2"); h.textContent = def.title; sec.appendChild(h);
        const help = eln("p","help"); help.textContent = def.help; sec.appendChild(help);

        if (def.kind === "object") {
          const grid = eln("div","links-grid");
          grid.dataset.box = name;
          const obj = DATA[name] || {};
          def.keys.forEach(([key,label]) => grid.appendChild(makeInput(key, label, obj[key] ?? "")));
          sec.appendChild(grid);
        } else {
          const listBox = eln("div"); listBox.dataset.box = name;
          (DATA[name] || []).forEach(item => makeRow(def, item, listBox));
          sec.appendChild(listBox);
          const add = eln("button","add-btn"); add.type="button"; add.textContent="+ 항목 추가";
          add.onclick = () => makeRow(def, {}, listBox);
          sec.appendChild(add);
        }
        root.appendChild(sec);
      });
    }

    function collect() {
      const out = {};
      Object.keys(SCHEMA).forEach(name => {
        const def = SCHEMA[name];
        const box = document.querySelector(`[data-box="${name}"]`);
        if (def.kind === "object") {
          const obj = {};
          box.querySelectorAll("input,select").forEach(inp => { obj[inp.dataset.key] = inp.value; });
          out[name] = obj;
        } else {
          const arr = [];
          box.querySelectorAll(".row").forEach(row => {
            const item = {};
            row.querySelectorAll("input,select").forEach(inp => {
              let v = inp.value;
              if (inp.dataset.key === "ready") v = (v === "true");
              item[inp.dataset.key] = v;
            });
            arr.push(item);
          });
          out[name] = arr;
        }
      });
      return out;
    }

    function download() {
      const data = collect();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = eln("a");
      a.href = URL.createObjectURL(blob);
      a.download = "data.json";
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(a.href);
      const msg = $("#savedMsg"); msg.hidden = false;
      setTimeout(() => { msg.hidden = true; }, 4000);
    }

    async function loadCurrent() {
      try {
        const res = await fetch("data.json", { cache: "no-store" });
        if (res.ok) { DATA = await res.json(); }
        else { DATA = structuredClone(SEED); }
      } catch (e) { DATA = structuredClone(SEED); }
      buildForms();
    }

    $("#saveBtn").onclick = download;
    $("#reloadBtn").onclick = loadCurrent;
    loadCurrent();
  </script>
</body>
</html>
